<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuclidCam - Camera Roll</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='logo.gif') }}" alt="EuclidCam" class="hero-gif">
        <p class="subtitle">Camera roll</p>
    </header>

    <main class="gallery">
        {% if images %}
            {% for image in images %}
            <div class="card">
                <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
                <div class="actions">
                    <span class="filename">{{ image }}</span>
                    <div class="buttons">
                        <a href="{{ url_for('download_image', filename=image) }}" class="btn download">Download</a>
                        <form action="{{ url_for('delete_image', filename=image) }}" method="POST" onsubmit="return confirm('Delete this image?');">
                            <button type="submit" class="btn delete">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty">
                <p>No images captured yet. Files expected in <code>Captured/</code></p>
            </div>
        {% endif %}
    </main>
</body>
</html>
